name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install -r requirements-test.txt
    
    - name: Run tests
      env:
        DATABASE_URL: "postgresql://test:test@localhost:5432/test"
        REDIS_URL: "redis://localhost:6379"
        SECRET_KEY: "test-secret-key-for-ci-32chars!"
        ADMIN_PASSWORD: "Ancora2026!"
        GOOGLE_API_KEY: "fake-key-for-tests"
      working-directory: .
      run: |
        PYTHONPATH=backend python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Check syntax
      run: |
        python -m py_compile backend/app/main.py
        find backend/app/plugins -name "*.py" -exec python -m py_compile {} \;
        echo "All files compile OK"
